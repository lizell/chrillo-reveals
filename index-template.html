<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chrillo-reveals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at center, #111133 0%, #0a0a1a 70%);
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-weight: 800;
      font-size: 2.4rem;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #6ea8fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      color: #8888aa;
      font-weight: 300;
      font-size: 0.9rem;
      margin-bottom: 3rem;
    }
    .presentations {
      list-style: none;
      width: 100%;
      max-width: 600px;
    }
    .presentations li {
      margin-bottom: 0.75rem;
    }
    .presentations a {
      display: block;
      padding: 1.2rem 1.5rem;
      background: rgba(110, 168, 254, 0.06);
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #6ea8fe;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s ease;
    }
    .presentations a:hover {
      background: rgba(110, 168, 254, 0.12);
      border-color: #6ea8fe;
      transform: translateY(-2px);
    }
    .presentations a span {
      display: block;
      color: #8888aa;
      font-weight: 300;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <h1>chrillo-reveals</h1>
  <p class="subtitle">Presentations by Chrille</p>
  <ul class="presentations">
    <li>
      <a href="hur-ai-andrar-yrkesrollen.html">
        Hur AI ändrar yrkesrollen
        <span>Chas Academy · Öppet hus</span>
      </a>
    </li>
  </ul>
</body>
</html>
